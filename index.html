<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MIT Biology — Receipt Stamper</title>
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  background:#0D3551;
  color:#e0e0e0;min-height:100vh;padding:0;
}

/* ── Top Banner ── */
.banner{
  background:linear-gradient(135deg,#0D3551 0%,#771A51 100%);
  padding:30px 20px 24px 20px;
  text-align:center;
  border-bottom:3px solid #C02184;
}
.banner h1{
  font-size:26px;font-weight:700;color:#ffffff;margin-bottom:4px;
}
.banner .subtitle{
  font-size:14px;color:rgba(255,255,255,0.55);
}
.logo-bar{
  display:flex;justify-content:center;align-items:center;
  gap:12px;margin-bottom:12px;
}
.logo-dot{
  width:10px;height:10px;border-radius:50%;
}

/* ── Main Container ── */
.container{
  max-width:600px;margin:0 auto;padding:20px;
}

/* ── Cards ── */
.card{
  background:linear-gradient(135deg,rgba(13,53,81,0.95),rgba(13,53,81,0.8));
  border:1px solid rgba(0,167,147,0.15);
  border-radius:16px;
  padding:24px;margin-bottom:16px;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
}
.card-title{
  font-size:13px;font-weight:600;text-transform:uppercase;
  letter-spacing:1.2px;color:#00A793;margin-bottom:14px;
}
.step-num{
  display:inline-block;
  background:#C02184;
  color:white;width:24px;height:24px;border-radius:8px;text-align:center;
  line-height:24px;font-size:12px;font-weight:700;margin-right:8px;
}

/* ── Upload Zone ── */
.upload-zone{
  border:2px dashed rgba(0,162,194,0.4);border-radius:12px;
  padding:40px 20px;text-align:center;cursor:pointer;
  transition:all 0.3s;background:rgba(0,162,194,0.05);
}
.upload-zone:active{
  background:rgba(0,162,194,0.12);
}
.upload-zone.has-file{
  border-color:rgba(0,167,147,0.6);background:rgba(0,167,147,0.08);
}
.upload-icon{font-size:40px;margin-bottom:10px}
.upload-text{font-size:16px;color:rgba(255,255,255,0.6)}
.upload-filename{font-size:14px;color:#00A793;margin-top:8px;font-weight:600}
#fileInput{display:none}

/* ── Inputs ── */
.text-input{
  width:100%;background:rgba(0,0,0,0.25);
  border:1px solid rgba(0,167,147,0.2);border-radius:10px;
  padding:14px 16px;color:#fff;font-size:16px;font-family:inherit;outline:none;
  transition:border-color 0.3s;
}
.text-input:focus{border-color:#00A2C2}
.text-input::placeholder{color:rgba(255,255,255,0.25)}

.input-label{
  font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:8px;display:block;
}

/* ── Font Size ── */
.font-size-row{display:flex;align-items:center;gap:12px;margin-top:12px}
.font-size-row label{font-size:13px;color:rgba(255,255,255,0.5);white-space:nowrap}
.font-size-slider{
  flex:1;-webkit-appearance:none;height:4px;border-radius:2px;
  background:rgba(255,255,255,0.1);outline:none;
}
.font-size-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:24px;height:24px;border-radius:50%;
  background:linear-gradient(135deg,#C02184,#771A51);cursor:pointer;
  border:2px solid rgba(255,255,255,0.3);
}
.font-size-value{font-size:14px;color:#00A2C2;font-weight:600;min-width:35px;text-align:center}

/* ── Buttons ── */
.btn-primary{
  width:100%;padding:16px;border:none;border-radius:12px;font-size:17px;
  font-weight:700;cursor:pointer;transition:all 0.3s;
  color:white;letter-spacing:0.5px;
}
.btn-primary:disabled{opacity:0.35;cursor:not-allowed}
.btn-primary:active:not(:disabled){transform:scale(0.98)}

.btn-stamp{
  background:linear-gradient(135deg,#C02184,#771A51);
  box-shadow:0 4px 20px rgba(192,33,132,0.3);
}

.btn-save{
  background:linear-gradient(135deg,#00A793,#00A2C2);
  box-shadow:0 4px 20px rgba(0,167,147,0.3);
  margin-top:10px;
}

.btn-secondary{
  width:100%;padding:14px;border:1px solid rgba(0,167,147,0.25);
  border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;
  background:rgba(0,167,147,0.08);color:rgba(255,255,255,0.7);
  transition:all 0.3s;margin-top:10px;
}
.btn-secondary:active{background:rgba(0,167,147,0.15)}

/* ── Status ── */
.status-bar{margin-top:16px;padding:14px 16px;border-radius:10px;font-size:14px;display:none}
.status-bar.info{display:block;background:rgba(0,162,194,0.1);border:1px solid rgba(0,162,194,0.3);color:#00A2C2}
.status-bar.success{display:block;background:rgba(0,167,147,0.1);border:1px solid rgba(0,167,147,0.3);color:#00A793}
.status-bar.error{display:block;background:rgba(192,33,132,0.1);border:1px solid rgba(192,33,132,0.3);color:#C02184}

/* ── Preview ── */
.preview-frame{
  width:100%;height:500px;border-radius:10px;
  border:1px solid rgba(0,167,147,0.2);background:white;
  margin-top:12px;display:none;
}

/* ── Spinner ── */
.spinner{
  display:inline-block;width:16px;height:16px;
  border:2px solid rgba(255,255,255,0.2);border-top-color:white;
  border-radius:50%;animation:spin 0.8s linear infinite;
  margin-right:8px;vertical-align:middle;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Footer ── */
.footer{
  text-align:center;padding:20px;
  color:rgba(255,255,255,0.2);font-size:11px;
}
.footer-colors{
  display:flex;justify-content:center;gap:6px;margin-bottom:8px;
}
.footer-dot{width:8px;height:8px;border-radius:50%}

/* ── Reset Button ── */
.btn-reset{
  width:100%;padding:14px;border:1px solid rgba(192,33,132,0.25);
  border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;
  background:rgba(192,33,132,0.08);color:rgba(255,255,255,0.5);
  transition:all 0.3s;margin-top:10px;
}
.btn-reset:active{background:rgba(192,33,132,0.15)}
</style>
</head>
<body>

<!-- ── BANNER ── -->
<div class="banner">
  <div class="logo-bar">
    <div class="logo-dot" style="background:#C02184"></div>
    <div class="logo-dot" style="background:#771A51"></div>
    <div class="logo-dot" style="background:#0D3551"></div>
    <div class="logo-dot" style="background:#00A793"></div>
    <div class="logo-dot" style="background:#00A2C2"></div>
  </div>
  <h1>📄 Receipt Stamper</h1>
  <div class="subtitle">MIT Biology — Stamp &amp; Save PDFs</div>
</div>

<div class="container">

<!-- STEP 1: SELECT PDF -->
<div class="card">
  <div class="card-title"><span class="step-num">1</span> Select Receipt PDF</div>
  <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
    <div class="upload-icon" id="uploadIcon">📎</div>
    <div class="upload-text" id="uploadText">Tap to select a PDF</div>
    <div class="upload-filename" id="uploadFilename"></div>
  </div>
  <input type="file" id="fileInput" accept="application/pdf" onchange="handleFile(this)">
</div>

<!-- STEP 2: OVERLAY TEXT -->
<div class="card">
  <div class="card-title"><span class="step-num">2</span> Overlay Text</div>
  <input type="text" class="text-input" id="overlayText" placeholder="e.g. SUBMITTED - Q1 2026" value="SUBMITTED">
  <div class="font-size-row">
    <label>Size</label>
    <input type="range" class="font-size-slider" id="fontSize" min="12" max="48" value="26" oninput="updateFontSizeLabel()">
    <span class="font-size-value" id="fontSizeLabel">26pt</span>
  </div>
</div>

<!-- STEP 3: NAME YOUR FILE -->
<div class="card">
  <div class="card-title"><span class="step-num">3</span> Save As</div>
  <span class="input-label">File name (without .pdf)</span>
  <input type="text" class="text-input" id="outputName" placeholder="e.g. Lunch_Receipt_Jan2026">
</div>

<!-- STEP 4: ACTIONS -->
<div class="card">
  <button class="btn-primary btn-stamp" id="btnPreview" onclick="previewPdf()" disabled>
    👁 Preview Stamped PDF
  </button>

  <button class="btn-primary btn-save" id="btnSave" onclick="savePdf()" style="display:none">
    💾 Save PDF
  </button>

  <button class="btn-reset" id="btnReset" onclick="resetAll()" style="display:none">
    🔄 Start Over
  </button>

  <div class="status-bar" id="statusBar"></div>
  <iframe class="preview-frame" id="previewFrame"></iframe>
</div>

</div>

<!-- ── FOOTER ── -->
<div class="footer">
  <div class="footer-colors">
    <div class="footer-dot" style="background:#C02184"></div>
    <div class="footer-dot" style="background:#771A51"></div>
    <div class="footer-dot" style="background:#0D3551"></div>
    <div class="footer-dot" style="background:#00A793"></div>
    <div class="footer-dot" style="background:#00A2C2"></div>
  </div>
  MIT Biology — Receipt Stamper
</div>

<script>
// ═══════════════════════════════════════
//  STATE
// ═══════════════════════════════════════
var selectedFile = null;
var selectedFileBytes = null;
var stampedPdfBytes = null;

// ═══════════════════════════════════════
//  FILE HANDLING
// ═══════════════════════════════════════
function handleFile(input) {
  var file = input.files[0];
  if (!file) return;
  if (file.type !== 'application/pdf') {
    setStatus('❌ Please select a PDF file', 'error');
    return;
  }
  selectedFile = file;
  stampedPdfBytes = null;

  // Auto-fill the save name from the original filename
  var baseName = file.name.replace('.pdf', '').replace('.PDF', '');
  document.getElementById('outputName').value = baseName + '_stamped';

  var reader = new FileReader();
  reader.onload = function(e) {
    selectedFileBytes = new Uint8Array(e.target.result);
    updateFileUI();
    updateButtons();
    setStatus('Loaded: ' + file.name + ' (' + (file.size / 1024).toFixed(1) + ' KB)', 'info');
  };
  reader.readAsArrayBuffer(file);
}

function updateFileUI() {
  var zone = document.getElementById('uploadZone');
  var icon = document.getElementById('uploadIcon');
  var text = document.getElementById('uploadText');
  var fname = document.getElementById('uploadFilename');
  if (selectedFile) {
    zone.classList.add('has-file');
    icon.textContent = '✅';
    text.textContent = 'PDF loaded — tap to change';
    fname.textContent = selectedFile.name;
  } else {
    zone.classList.remove('has-file');
    icon.textContent = '📎';
    text.textContent = 'Tap to select a PDF';
    fname.textContent = '';
  }
}

// ═══════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════
function updateFontSizeLabel() {
  document.getElementById('fontSizeLabel').textContent =
    document.getElementById('fontSize').value + 'pt';
}

function updateButtons() {
  document.getElementById('btnPreview').disabled = !selectedFileBytes;
}

function setStatus(msg, type) {
  var el = document.getElementById('statusBar');
  el.className = 'status-bar ' + type;
  el.innerHTML = msg;
}

// ═══════════════════════════════════════
//  PDF STAMPING — FIRST PAGE ONLY
// ═══════════════════════════════════════
async function stampPdf() {
  var PDFDocument = PDFLib.PDFDocument;
  var rgb = PDFLib.rgb;
  var StandardFonts = PDFLib.StandardFonts;

  var overlayText = document.getElementById('overlayText').value || 'SUBMITTED';
  var fontSize = parseInt(document.getElementById('fontSize').value);

  var pdfDoc = await PDFDocument.load(selectedFileBytes);
  var font = await pdfDoc.embedFont(StandardFonts.HelveticaBold);
  var pages = pdfDoc.getPages();

  // ── FIRST PAGE ONLY ──
  var page = pages[0];
  var size = page.getSize();
  var textWidth = font.widthOfTextAtSize(overlayText, fontSize);

  // Top centered
  var x = (size.width - textWidth) / 2;
  var y = size.height - 50;
  var pad = 12;

  // White background box
  page.drawRectangle({
    x: x - pad,
    y: y - 6,
    width: textWidth + pad * 2,
    height: fontSize + 14,
    color: rgb(1, 1, 1),
    borderColor: rgb(0.05, 0.21, 0.32),  // MIT Navy border
    borderWidth: 1,
    opacity: 0.95
  });

  // MIT Navy text
  page.drawText(overlayText, {
    x: x,
    y: y,
    size: fontSize,
    font: font,
    color: rgb(0.05, 0.21, 0.32)  // #0D3551 MIT Navy
  });

  stampedPdfBytes = await pdfDoc.save();
  return stampedPdfBytes;
}

// ═══════════════════════════════════════
//  PREVIEW
// ═══════════════════════════════════════
async function previewPdf() {
  try {
    setStatus('<span class="spinner"></span> Generating preview...', 'info');
    var bytes = await stampPdf();
    var blob = new Blob([bytes], { type: 'application/pdf' });
    var url = URL.createObjectURL(blob);
    var frame = document.getElementById('previewFrame');
    frame.src = url;
    frame.style.display = 'block';

    // Show save & reset buttons
    document.getElementById('btnSave').style.display = 'block';
    document.getElementById('btnReset').style.display = 'block';

    setStatus('✅ Preview ready — check it below, then tap Save', 'success');
  } catch (err) {
    setStatus('❌ Error: ' + err.message, 'error');
  }
}

// ═══════════════════════════════════════
//  SAVE / DOWNLOAD
//  On iPad Safari this opens the Share
//  sheet so you can pick Files, AirDrop,
//  Dropbox, etc.
// ═══════════════════════════════════════
function savePdf() {
  if (!stampedPdfBytes) return;

  var fileName = document.getElementById('outputName').value.trim();
  if (!fileName) {
    fileName = 'receipt_stamped';
  }
  // Make sure it ends with .pdf
  if (!fileName.toLowerCase().endsWith('.pdf')) {
    fileName += '.pdf';
  }

  var blob = new Blob([stampedPdfBytes], { type: 'application/pdf' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = fileName;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  setTimeout(function() {
    URL.revokeObjectURL(url);
  }, 5000);

  setStatus('✅ Saving <strong>' + fileName + '</strong> — check your Downloads or choose a location from the share sheet', 'success');
}

// ═══════════════════════════════════════
//  RESET
// ═══════════════════════════════════════
function resetAll() {
  selectedFile = null;
  selectedFileBytes = null;
  stampedPdfBytes = null;

  document.getElementById('fileInput').value = '';
  document.getElementById('overlayText').value = 'SUBMITTED';
  document.getElementById('outputName').value = '';
  document.getElementById('fontSize').value = 26;
  document.getElementById('fontSizeLabel').textContent = '26pt';
  document.getElementById('previewFrame').style.display = 'none';
  document.getElementById('previewFrame').src = '';
  document.getElementById('btnSave').style.display = 'none';
  document.getElementById('btnReset').style.display = 'none';

  updateFileUI();
  updateButtons();
  setStatus('🔄 Reset — ready for next receipt', 'info');
}
</script>
</body>
</html>
